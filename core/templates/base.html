<!doctype html>
<html lang="en-US">
  <head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
      new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
      j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
      'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer','GTM-5MLD8S5');</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="me" href="https://opalstack.social/@anthonydb">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="google-site-verification" content="3cXq7qpM2caPBH74yvmYJYdTIw18jO5ESgpf1JNMRTw">

    <title>{% block title %}Anthony DeBarros{% endblock %}</title>
    <link rel="canonical" href="{% block canonical %}https://anthonydebarros.com/{% endblock %}">
    <meta name="description" content="{% block description %}{% endblock %}">
    <meta property="og:locale" content="en_US">
    <meta property="og:type" content="{% block og_type %}article{% endblock %}">
    <meta property="og:title" content="{% block og_title %}Anthony DeBarros{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{% endblock %}">
    <meta property="og:url" content="{% block og_url %}https://anthonydebarros.com/{% endblock %}">
    <meta property="og:site_name" content="Anthony DeBarros">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@anthonydb">

    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'home.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@200;400&family=Open+Sans:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=PT+Serif:ital,wght@0,400;0,700&display=swap">

    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5MLD8S5"
      height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    {% include 'menu.html' %}

    {% block content %}{% endblock %}

    {% include 'footer.html' %}
  </body>
</html>
